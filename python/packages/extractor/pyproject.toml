[project]
name = "insightgraph-extractor"
version = "0.1.0"
description = "LLM-based entity, metric, and claim extraction for InsightGraph"
requires-python = ">=3.11"
dependencies = [
    "insightgraph-core",
    "litellm>=1.40",
]

[tool.uv.sources]
insightgraph-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/insightgraph_extractor"]
