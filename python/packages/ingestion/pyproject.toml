[project]
name = "insightgraph-ingestion"
version = "0.1.0"
description = "File ingestion and task dispatch for InsightGraph"
requires-python = ">=3.11"
dependencies = [
    "insightgraph-core",
]

[tool.uv.sources]
insightgraph-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/insightgraph_ingestion"]
