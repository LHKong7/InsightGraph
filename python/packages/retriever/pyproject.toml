[project]
name = "insightgraph-retriever"
version = "0.1.0"
description = "Graph and vector retrieval with agent tools for InsightGraph"
requires-python = ">=3.11"
dependencies = [
    "insightgraph-core",
    "insightgraph-graph",
    "litellm>=1.40",
]

[tool.uv.sources]
insightgraph-core = { workspace = true }
insightgraph-graph = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/insightgraph_retriever"]
