[project]
name = "insightgraph-parser"
version = "0.1.0"
description = "Document parsing (PDF/DOCX) to Document IR for InsightGraph"
requires-python = ">=3.11"
dependencies = [
    "insightgraph-core",
    "pymupdf>=1.24",
]

[tool.uv.sources]
insightgraph-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/insightgraph_parser"]
