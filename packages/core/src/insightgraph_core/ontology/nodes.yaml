nodes:
  Report:
    properties:
      report_id: {type: string, required: true}
      title: {type: string, required: true}
      source_filename: {type: string, required: true}
      date: {type: string}
      num_pages: {type: integer}
      domain: {type: string}
      language: {type: string}
    constraints:
      - unique: [report_id]

  Section:
    properties:
      section_id: {type: string, required: true}
      title: {type: string}
      level: {type: integer, required: true}
      order: {type: integer, required: true}
    constraints:
      - unique: [section_id]

  Paragraph:
    properties:
      paragraph_id: {type: string, required: true}
      text: {type: string, required: true}
      page: {type: integer}
    constraints:
      - unique: [paragraph_id]

  Entity:
    properties:
      entity_id: {type: string, required: true}
      name: {type: string, required: true}
      canonical_name: {type: string}
      entity_type: {type: string, required: true}
      description: {type: string}
      aliases: {type: list}
    constraints:
      - unique: [entity_id]
    indexes:
      - fulltext: [name, canonical_name, description]

  Metric:
    properties:
      metric_id: {type: string, required: true}
      name: {type: string, required: true}
      unit: {type: string}
      domain: {type: string}
    constraints:
      - unique: [metric_id]

  MetricValue:
    properties:
      value_id: {type: string, required: true}
      value: {type: float, required: true}
      unit: {type: string}
      period: {type: string}
      context: {type: string}
    constraints:
      - unique: [value_id]

  Claim:
    properties:
      claim_id: {type: string, required: true}
      text: {type: string, required: true}
      claim_type: {type: string}
      confidence: {type: float}
      polarity: {type: string}
    constraints:
      - unique: [claim_id]
    indexes:
      - fulltext: [text]

  SourceSpan:
    properties:
      span_id: {type: string, required: true}
      text: {type: string, required: true}
      page: {type: integer, required: true}
      start_char: {type: integer}
      end_char: {type: integer}
      block_id: {type: string}
    constraints:
      - unique: [span_id]

  TimePeriod:
    properties:
      period_id: {type: string, required: true}
      label: {type: string, required: true}
      start_date: {type: string}
      end_date: {type: string}
    constraints:
      - unique: [period_id]
