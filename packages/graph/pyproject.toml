[project]
name = "insightgraph-graph"
version = "0.1.0"
description = "Neo4j graph storage, writer, and reader for InsightGraph"
requires-python = ">=3.11"
dependencies = [
    "insightgraph-core",
    "neo4j>=5.20",
]

[tool.uv.sources]
insightgraph-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/insightgraph_graph"]
