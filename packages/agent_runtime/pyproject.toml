[project]
name = "insightgraph-agent-runtime"
version = "0.1.0"
description = "Agent runtime with planner, retriever, analyst, and verifier for InsightGraph"
requires-python = ">=3.11"
dependencies = [
    "insightgraph-core",
    "insightgraph-retriever",
    "litellm>=1.40",
]

[tool.uv.sources]
insightgraph-core = { workspace = true }
insightgraph-retriever = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/insightgraph_agent"]
